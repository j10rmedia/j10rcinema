<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>J10R Cinema</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        /* Header */
        .header {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0));
        }

        /* Section Title */
        .section-title {
            margin: 30px 40px 10px;
            font-size: 22px;
            font-weight: bold;
        }

        /* Movie Row */
        .row {
            display: flex;
            overflow-x: auto;
            padding: 0 40px 20px;
            gap: 12px;
        }

        .row::-webkit-scrollbar {
            height: 8px;
        }

        .row::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* Movie Card */
        .movie {
            min-width: 180px;
            height: 270px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .movie:hover {
            transform: scale(1.05);
        }

        .movie img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Movie Title Overlay */
        .movie-title {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="header">J10R CINEMA</div>

    <!-- Featured Section -->
    <div class="section-title">CATEGORY</div>
    <div class="row">
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Movie+1">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Movie+2">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Movie+3">
            <div class="movie-title">any movie</div>
        </div>
    </div>

    <!-- Classics Section -->
    <div class="section-title">CATEGORY</div>
    <div class="row">
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Classic+1">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Classic+2">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Classic+3">
            <div class="movie-title">any movie</div>
        </div>
    </div>

    <!-- Horror Section -->
    <div class="section-title">CATEGORY</div>
    <div class="row">
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Horror+1">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Horror+2">
            <div class="movie-title">any movie</div>
        </div>
        <div class="movie">
            <img src="https://via.placeholder.com/300x450?text=Horror+3">
            <div class="movie-title">any movie</div>
        </div>
    </div>

</body>
</html>
